name: icon-automation
on:
  push:
    branches:
    - master
    # file paths to consider in the event. Optional; defaults to all.
    paths:
      - package.json
  workflow_dispatch:

jobs:
  icon_automation:
    name: figma icon automation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v2
      with:
        # PAT with write access so the commit-back step can push to master
        token: ${{ secrets.GH_TOKEN }}
    - uses: actions/setup-node@v2
      with:
        node-version: '20.x'
        registry-url: 'https://npm.notta.ai/'
    - run: yarn config set strict-ssl false
    - run: yarn install
    - name: Figma Action
      uses: primer/figma-action@v1.0.0-alpha.2
      with:
        args: "format=svg outputDir=./src/"
      env:
        FIGMA_FILE_URL: ${{ secrets.FIGMA_FILE_URL }}
        FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
    - run: yarn generate
    - run: yarn build
    - run: yarn build:bundle
    - run: echo "//npm.notta.ai/:_authToken=${{ secrets.NPM_AUTH_TOKEN }}" > ~/.npmrc
    - run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
    # 把 Figma 重新生成的图标源码回写到仓库，消除 src/ 与已发布 dist/ 的漂移。
    # 仅提交 src/（dist/ 已在 .gitignore），不触碰 package.json，配合 paths 过滤与
    # [skip ci] 双重保证不会自我触发新一轮工作流。
    - name: Commit regenerated icon sources back to master
      run: |
        git config user.name "notta-icon-bot"
        git config user.email "icon-bot@notta.ai"
        git add src
        if git diff --cached --quiet; then
          echo "图标源码无变化，跳过回写。"
        else
          git commit -m "chore(icons): 同步 Figma 重新生成的图标源码 [skip ci]"
          git push origin HEAD:master
        fi
    - name: Pull Request URL
      uses: kceb/pull-request-url-action@v2
      id: pr-url
 #   - run: echo "prUrl:${{ steps.pr-url.outputs.url }}"
    - name: slack notification
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_BOT_WEBHOOK_URL }}
        SLACK_COLOR: '#2f89f0'
        SLACK_ICON: https://avatars.githubusercontent.com/u/68847252?s=60&v=4
        SLACK_USERNAME: NottaOrg/notta-web-icon
        SLACK_TITLE: notta-web-icon Updates!
        SLACK_MESSAGE: |
          兄弟们，咱们的图标更新啦！
          请使用 yarn upgrade notta-web-icon --latest 更新。
          在线查看图标: https://notta-web-icon.vercel.app
          查看更新详情: ${{ steps.pr-url.outputs.url }}
